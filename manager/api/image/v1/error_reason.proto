syntax = "proto3";

package api.image.v1;

import "errors/errors.proto";

option go_package = "manager/api/image/v1;v1";
option java_multiple_files = true;
option java_package = "api.image.v1";

enum ErrorReason {
  option (errors.default_code) = 500;

  INVALID_IMAGE = 0 [(errors.code) = 400];

  INVALID_IMAGE_PAGINATION = 1 [(errors.code) = 400];

  IMAGE_NOT_FOUND = 2 [(errors.code) = 404];

  INVALID_IMAGE_TRANSFORMATIONS = 3 [(errors.code) = 400];

  NOT_ACCEPTABLE_MEDIA_TYPE = 4 [(errors.code) = 406];

  INVALID_MIME_TYPE = 5 [(errors.code) = 300];
}
