syntax = "proto3";

package api.user.v1;

import "errors/errors.proto";

option go_package = "manager/api/user/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.v1";

enum ErrorReason {
  option (errors.default_code) = 500;

  INVALID_USERNAME_OR_PASSWORD = 0 [(errors.code) = 400];

  USERNAME_ALREADY_EXISTS = 1 [(errors.code) = 400];

  USER_NOT_FOUND = 2 [(errors.code) = 404];
}
