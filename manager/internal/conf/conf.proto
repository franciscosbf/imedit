syntax = "proto3";

package kratos.api;

option go_package = "manager/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Auth auth = 2;
  Data data = 3;
}

message Server {
  message HTTP {
    string endpoint = 1;
    google.protobuf.Duration request_timeout = 2;
    uint32 max_image_size = 3;
  }

  HTTP http = 1;
  google.protobuf.Duration shutdown_timeout = 2;
}

message Auth {
  string algorithm = 1;
  string public_key_file = 2;
  string private_key_file = 3;
  string issuer = 4;
  google.protobuf.Duration expiration_time = 5;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }

  message Redis {
    string endpoint = 1;
    string password = 2;
    google.protobuf.Duration dial_timeout = 3;
    google.protobuf.Duration read_timeout = 4;
    google.protobuf.Duration write_timeout = 5;
  }

  message MinIO {
    string endpoint = 1;
    string access_key = 2;
    string secret_key = 3;
  }

  message RabbitMQ {
    string source = 1;
  }

  Database database = 1;
  Redis redis = 2;
  MinIO minio = 3;
  RabbitMQ rabbitmq = 4;
}
